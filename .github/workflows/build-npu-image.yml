name: Build NPU Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag suffix (final tag format: <CANN_VERSION>-<DEVICE_TYPE>-<image_tag>)'
        required: true
        default: 'B001'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.actor }}/sglang_npu

jobs:
  build-npu-image:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        CANN_VERSION: ['8.5.0']
        DEVICE_TYPE: ['a3', '910b']

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout sglang repository
        uses: actions/checkout@v4
        with:
          repository: sgl-project/sglang
          path: sglang
          ref: main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./sglang
          file: ./sglang/docker/npu.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.CANN_VERSION }}-${{ matrix.DEVICE_TYPE }}-${{ inputs.image_tag }}
          build-args: |
            CANN_VERSION=${{ matrix.CANN_VERSION }}
            DEVICE_TYPE=${{ matrix.DEVICE_TYPE }}
            SGLANG_KERNEL_NPU_TAG=2026.04.15.rc2
          cache-from: type=gha
          cache-to: type=gha,mode=max
