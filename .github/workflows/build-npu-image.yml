name: Build NPU Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag suffix (final tag format: <CANN_VERSION>-<DEVICE_TYPE>-<image_tag>)'
        required: true
        default: 'B001'

env:
  REGISTRY: ghcr.io
  BUILDKIT_PROGRESS: plain

jobs:
  build-npu-image:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        CANN_VERSION: ['8.5.0']
        DEVICE_TYPE: ['a3', '910b']

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout sglang repository
        uses: actions/checkout@v4
        with:
          repository: sgl-project/sglang
          path: sglang
          ref: main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name (lowercase)
        id: image
        run: |
          echo "owner_lower=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./sglang
          file: ./sglang/docker/npu.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.owner_lower }}/sglang_npu:${{ matrix.CANN_VERSION }}-${{ matrix.DEVICE_TYPE }}-${{ inputs.image_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            CANN_VERSION=${{ matrix.CANN_VERSION }}
            DEVICE_TYPE=${{ matrix.DEVICE_TYPE }}
            SGLANG_KERNEL_NPU_TAG=2026.04.15.rc2
          cache-from: type=gha
          cache-to: type=gha,mode=max

  generate-report:
    needs: build-npu-image
    uses: ./.github/workflows/generate-build-report.yml
    with:
      # Pass the parent workflow run ID so the report generator can access all jobs' logs
      run_id: ${{ github.run_id }}
      output_artifact_name: 'sglang-npu-build-reports'
      retention_days: 30
    permissions:
      contents: read
      actions: read

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-npu-image, generate-report]
    if: always()

    steps:
      - name: Generate Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Workflow Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow**: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "| CANN_VERSION | DEVICE_TYPE | Image Tag | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|-------------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 8.5.0 | a3 | ${{ inputs.image_tag }} | ${{ needs.build-npu-image.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 8.5.0 | 910b | ${{ inputs.image_tag }} | ${{ needs.build-npu-image.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pushed Images" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ github.repository_owner }}/sglang_npu:8.5.0-a3-${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ github.repository_owner }}/sglang_npu:8.5.0-910b-${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Reports" >> $GITHUB_STEP_SUMMARY
          echo "Download build time reports from artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "- \`sglang-npu-build-reports\` - Contains JSON and HTML reports with detailed timing information" >> $GITHUB_STEP_SUMMARY
