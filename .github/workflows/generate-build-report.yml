name: Generate Build Time Report

on:
  workflow_call:
    inputs:
      run_id:
        description: 'Workflow run ID to analyze'
        required: true
        type: string
      output_artifact_name:
        description: 'Name of the artifact to upload'
        required: false
        default: 'build-reports'
        type: string
      retention_days:
        description: 'Number of days to retain artifacts'
        required: false
        default: 30
        type: number
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Workflow run ID to analyze'
        required: true
        type: string
      output_artifact_name:
        description: 'Name of the artifact to upload'
        required: false
        default: 'build-reports'
        type: string
      retention_days:
        description: 'Number of days to retain artifacts'
        required: false
        default: 30
        type: number

jobs:
  generate-report:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Generate build time report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ inputs.run_id || github.run_id }}
          REPO: ${{ github.repository }}
          OUTPUT_DIR: '.'
        run: |
          python scripts/build_time_report.py

      - name: Upload build report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_artifact_name }}
          path: |
            build-report.json
            build-report.html
          retention-days: ${{ inputs.retention_days }}
